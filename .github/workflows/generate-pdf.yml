name: Generate PDF

on:
  push:
    branches: [main]
    paths:
      - 'chapters/**.md'
      - 'images/**'
      - 'publishing/**.py'
      - 'publishing/book.css'
      - 'publishing/VERSION'
  workflow_dispatch:

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for accurate commit count

      - name: Compute semantic version
        run: |
          MAJOR_MINOR=$(cat publishing/VERSION)
          PATCH=$(git rev-list --count HEAD)
          RELEASE_VERSION="v${MAJOR_MINOR}.${PATCH}"
          echo "RELEASE_VERSION=${RELEASE_VERSION}" >> $GITHUB_ENV
          echo "Computed version: ${RELEASE_VERSION}"

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: pip
          cache-dependency-path: publishing/requirements.txt

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 \
            libcairo2 libgobject-2.0-0 \
            libharfbuzz0b libfribidi0 \
            fontconfig

      - name: Install Python dependencies
        run: pip install -r publishing/requirements.txt

      - name: Download images from Google Drive
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          python3.9 -c "
          import sys; sys.path.insert(0, 'publishing')
          from make_book import sync_images_from_gdrive
          sync_images_from_gdrive()
          "

      - name: Build A4 PDF
        run: python3.9 publishing/make_book.py --size a4 --no-download

      - name: Build Demy PDF
        run: python3.9 publishing/make_book.py --size demy --no-download

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: "ఆంజనేయముపాస్మహే ${{ env.RELEASE_VERSION }}"
          body: |
            Auto-generated PDFs from the latest markdown content.

            | File | Description |
            |------|-------------|
            | `anjaneyamupasmahe_a4.pdf` | Complete book (A4) |
            | `anjaneyamupasmahe_demy.pdf` | Complete book (Demy 5.5×8.5in) |

            **Commit:** ${{ github.sha }}
            **Triggered by:** ${{ github.event_name }}
          files: pdfs/*.pdf
          make_latest: true
